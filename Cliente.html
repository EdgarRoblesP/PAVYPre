                <div>
                    <h1 class="text-2xl font-bold"><span class="text-[#FFC107]">PAVY</span>Pre</h1>
                    <p class="text-sm text-gray-400">Portal del Cliente</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm text-gray-400">Bienvenido</p>
                    <a href="perfil.html" class="text-[#FFC107] font-semibold text-sm hover:underline" id="nombre-usuario">—</a>
                </div>
                <a href="php/salir.php" class="bg-[#FFC107] text-black px-6 py-2 rounded hover:bg-yellow-500 transition-colors font-semibold text-sm">
                    Cerrar Sesión
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">

        <div class="mb-8">
            <h2 class="text-3xl font-bold text-black mb-1">Mis Obras</h2>
            <p class="text-gray-500 text-sm mt-1">Consulta la información de tus proyectos</p>
        </div>

        <!-- Summary -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8" id="summary-cards"></div>

        <!-- Obras -->
        <div id="obras-container" class="space-y-6"></div>

    </main>

<script>
let obras = [];

const fmt = (n) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(n);
const fmtDate = (d) => new Date(d + 'T12:00:00').toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });

    */

    

function togglePagos(id) {
    const panel = document.getElementById('pagos-' + id);
    const chevron = document.getElementById('chevron-' + id);
    panel.classList.toggle('open');
    chevron.innerHTML = panel.classList.contains('open') ? '<img src="img/upArrow.svg" alt="cerrar" class="w-4 h-4">' 
                                                            : '<img src="img/downArrow.svg" alt="abrir" class="w-4 h-4">';
}

function renderObras() {
    document.getElementById('obras-container').innerHTML = obras.map(o => {
        const totalPagado = o.pagos.reduce((s, p) => s + p.monto, 0);
        const pct = o.costoFinal > 0 ? Math.min(100, (totalPagado / o.costoFinal) * 100).toFixed(0) : 0;
        // const st = estadoStyle[o.estado] || estadoStyle['En proceso'];
        const pendiente = Math.max(0, o.costoFinal - totalPagado);
        return `
        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition-shadow">
            <div class="p-6">
                <div class="flex items-start justify-between flex-wrap gap-3 mb-5">
                    <div>
                        <h3 class="text-xl font-semibold text-black mb-2">${o.nombre}</h3>
                    </div>
                    
                </div>

                <!-- Info grid -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-4">
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Fecha de Inicio</p>
                        <p class="font-semibold text-sm text-black">${fmtDate(o.fechaInicio)}</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Fecha de Finalización</p>
                        <p class="font-semibold text-sm text-black">${fmtDate(o.fechaFinalizacion)}</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Presupuesto Inicial</p>
                        <p class="font-semibold text-sm text-black">${fmt(o.presupuestoInicial)}</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Costo Final</p>
                        <p class="font-semibold text-sm text-[#FFC107]">${fmt(o.costoFinal)}</p>
                    </div>
                </div>

                <!-- Progress 
                <div class="mb-5">
                    <div class="flex justify-between text-xs text-gray-500 mb-1">
                        <span>Pagado: ${fmt(totalPagado)}</span>
                        <span>${pct}%</span>
                    </div>
                    <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-2 bg-[#FFC107] rounded-full transition-all" style="width:${pct}%"></div>
                    </div>
                    <div class="flex justify-between text-xs mt-1">
                        <span class="text-gray-400">Pendiente: <span class="font-semibold text-red-500">${fmt(pendiente)}</span></span>
                        <span class="text-gray-400">${o.pagos.length} pago${o.pagos.length !== 1 ? 's' : ''}</span>
                    </div>
                </div>

                -->

                <!-- Toggle pagos -->
                <button onclick="togglePagos('${o.id}')" class="flex items-center gap-2 text-black hover:text-[#FFC107] transition-colors font-medium text-sm">
                    <span>Ver Historial de Pagos</span>
                    <span id="chevron-${o.id}" class="text-xs"><img src="img/downArrow.svg" alt="abrir" class="w-4 h-4"></span>
                </button>
            </div>

            <!-- Pagos panel -->
            <div id="pagos-${o.id}" class="pagos-panel bg-gray-50 border-t border-gray-200">
                <div class="p-6">
                    <h4 class="text-l font-semibold text-black mb-4">Historial de Pagos</h4>
                    <div class="overflow-x-auto">
                        <table class="w-full ">
                            <thead>
                                <tr class="bg-black text-white">
                                    <th class="px-4 py-3 text-left ">Fecha</th>
                                    <th class="px-4 py-3 text-left">Tipo de Pago</th>
                                    <th class="px-4 py-3 text-right ">Monto</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${o.pagos.map((p, i) => `
                                <tr class="border-b border-gray-200 ${i % 2 === 0 ? '' : 'bg-white'}">
                                    <td class="px-4 py-3 text-gray-700">${fmtDate(p.fecha)}</td>
                                    <td class="px-4 py-3 text-gray-700">${p.tipoPago}</td>
                                    <td class="px-4 py-3 text-right font-semibold text-[#FFC107]">${fmt(p.monto)}</td>
                                </tr>`).join('')}
                                <tr class="bg-gray-100 text-white font-semibold">
                                    <td colspan="2" class="px-4 py-3 text-black ">Total Pagado</td>
                                    <td class="px-4 py-3 text-right text-[#FFC107] ">${fmt(totalPagado)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

window.addEventListener('pageshow', function(e) {
    fetch('php/get_sesion.php', { cache: 'no-store' })
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(s => {
            if (s.role !== 'cliente') { location.replace('Login.html'); return; }
            if (s.name) document.getElementById('nombre-usuario').textContent = s.name;
            if (e.persisted) return;

            // Cargar obras y pagos en paralelo, luego unirlos y renderizar
            Promise.all([
                fetch('php/get_obras_cliente.php').then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
                fetch('php/get_historial_pagos.php').then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            ])
            .then(([obrasData, pagosData]) => {
                // Agrupar pagos por id_obra
                const pagosPorObra = {};
                pagosData.forEach(p => {
                    if (!pagosPorObra[p.id_obra]) pagosPorObra[p.id_obra] = [];
                    pagosPorObra[p.id_obra].push(p);
                });

                // Adjuntar pagos a cada obra y calcular costoFinal
                obras = obrasData.map(o => {
                    const pagos = pagosPorObra[o.id] || [];
                    return {
                        ...o,
                        pagos,
                        costoFinal: pagos.reduce((s, p) => s + p.monto, 0)
                    };
                });

                renderObras();
            })
            .catch(() => {
                document.getElementById('obras-container').innerHTML =
                    '<p class="text-center text-gray-500 py-12">No se pudieron cargar los datos. Intenta más tarde.</p>';
            });
        })
        .catch(() => location.replace('Login.html'));
});
</script>
</body>
</html>

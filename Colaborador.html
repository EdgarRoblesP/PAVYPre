<script>
let obras = [];

const fmt = (n) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(n);
const fmtDate = (d) => new Date(d + 'T12:00:00').toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });

function calcSemanas(inicio, fin) {
    const ms = new Date(fin) - new Date(inicio);
    return Math.ceil(ms / (1000 * 60 * 60 * 24 * 7));
}

function isActive(fechaTermino) {
    return new Date(fechaTermino) > new Date();
}

// Render obras
function renderObras() {
    document.getElementById('obras-container').innerHTML = obras.map(o => {
        const semanas = calcSemanas(o.fechaInicio, o.fechaTermino);
        const total = semanas * o.salarioSemanal;
        const active = isActive(o.fechaTermino);
        return `
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex items-start justify-between flex-wrap gap-3 mb-4">
                <div>
                    <h3 class="text-xl font-semibold text-black">${o.nombreObra}</h3>
                    
                </div>
                <!--
                <span class="px-3 py-1 rounded-full text-xs font-semibold ${active ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-600'}">
                    ${active ? '🟡 En proceso' : '✅ Completada'}
                </span>
                -->
            </div>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <div>
                    <p class="text-xs text-gray-500 mb-1">Fecha de Inicio</p>
                    <p class="font-semibold text-sm text-black">${fmtDate(o.fechaInicio)}</p>
                </div>
                <div>
                    <p class="text-xs text-gray-500 mb-1">Fecha de Término</p>
                    <p class="font-semibold text-sm text-black">${fmtDate(o.fechaTermino)}</p>
                </div>
                <div>
                    <p class="text-xs text-gray-500 mb-1">Puesto</p>
                    <p class="font-semibold text-sm text-black">${o.puesto}</p>
                </div>
                <div>
                    <p class="text-xs text-gray-500 mb-1">Salario Semanal</p>
                    <p class="font-semibold text-[#FFC107] text-sm">${fmt(o.salarioSemanal)}</p>
                </div>
                <div class="bg-gray-50 rounded p-3 border-l-4 border-[#FFC107]">
                    <p class="text-xs text-gray-600 mb-1">Total Ganado</p>
                    <p class="font-semibold text-black">${fmt(total)}</p>
                    <p class="text-xs text-gray-400 mt-1">${semanas} semanas</p>
                </div>
            </div>
        </div>`;
    }).join('');
}

// Verificar sesión activa; redirigir a login si no hay sesión de colaborador
fetch('php/get_sesion.php')
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(s => {
        if (s.role !== 'colaborador') { location.replace('Login.html'); return; }
        if (s.name) document.getElementById('nombre-usuario').textContent = s.name;
    })
    .catch(() => location.replace('Login.html'));

// Cargar obras desde BD
fetch('php/get_obras_colaborador.php')
    .then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.json();
    })
    .then(data => {
        obras = data;
        renderObras();
        // renderSummary();
    })
    .catch(() => {
        document.getElementById('obras-container').innerHTML =
            '<p class="text-center text-gray-500 py-12">No se pudieron cargar los datos. Intenta más tarde.</p>';
    });
</script>

    <main class="max-w-7xl mx-auto px-6 py-8">

        <!-- Page Title -->
        <div class="mb-8">

            <p class="text-gray-500 text-sm">Historial de proyectos en los que has participado</p>

        </div>

        <!-- Obras List -->
        <div id="obras-container" class="space-y-6"></div>

        <!-- Summary Cards -->

    </main>

<script>
let obras     = [];
let obrasPage = 1;
const PER_PAGE = 5;

const fmt = (n) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(n);
const fmtDate = (d) => new Date(d + 'T12:00:00').toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });

function calcSemanas(inicio, fin) {
    const ms = new Date(fin) - new Date(inicio);
    return Math.ceil(ms / (1000 * 60 * 60 * 24 * 7));
}

function isActive(fechaTermino) {
    return new Date(fechaTermino) > new Date();
}

    const totalGanado = obras.reduce((sum, o) => sum + calcSemanas(o.fechaInicio, o.fechaTermino) * o.salarioSemanal, 0);

    */

// Render obras (página actual)
function renderObras() {
    const totalPags = Math.max(1, Math.ceil(obras.length / PER_PAGE));
    obrasPage       = Math.min(obrasPage, totalPags);
    const inicio    = (obrasPage - 1) * PER_PAGE;
    const pagina    = obras.slice(inicio, inicio + PER_PAGE);

    document.getElementById('obras-container').innerHTML = pagina.map(o => {
        const semanas = calcSemanas(o.fechaInicio, o.fechaTermino);
        const total   = semanas * o.salarioSemanal;
        const active  = isActive(o.fechaTermino);
        return `
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex items-start justify-between flex-wrap gap-3 mb-4">
                <div>
                    <h3 class="text-xl font-semibold text-black">${o.nombreObra}</h3>
                </div>
                <!--
                <span class="px-3 py-1 rounded-full text-xs font-semibold ${active ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-600'}">
                    ${active ? '🟡 En proceso' : '✅ Completada'}
                </span>
                -->
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <p class="text-xs text-gray-500 mb-1">Fecha de Inicio</p>
                    <p class="font-semibold text-sm text-black">${fmtDate(o.fechaInicio)}</p>
                </div>
                <div>
                    <p class="text-xs text-gray-500 mb-1">Fecha de Término</p>
                    <p class="font-semibold text-sm text-black">${fmtDate(o.fechaTermino)}</p>
                </div>
                <div class="bg-gray-50 rounded p-3 border-l-4 border-[#FFC107]">
                    <p class="text-xs text-gray-600 mb-1">Total Ganado</p>
                    <p class="font-semibold text-black">${fmt(total)}</p>
                    <p class="text-xs text-gray-400 mt-1">${semanas} semanas</p>
                </div>
            </div>
        </div>`;
    }).join('');

    renderPaginacion(totalPags);
}

function renderPaginacion(totalPags) {
    const c = document.getElementById('obras-paginacion');
    if (totalPags <= 1) { c.innerHTML = ''; return; }

    const desde = (obrasPage - 1) * PER_PAGE + 1;
    const hasta  = Math.min(obrasPage * PER_PAGE, obras.length);

    const btnBase   = 'px-3 py-1.5 text-sm rounded border transition-colors';
    const btnActivo = btnBase + ' bg-black text-white border-black font-semibold';
    const btnNormal = btnBase + ' border-gray-300 text-gray-600 hover:border-black hover:text-black';
    const btnDis    = btnBase + ' border-gray-200 text-gray-300 cursor-not-allowed';

    let botones = '';
    const prevDis = obrasPage === 1;
    botones += `<button onclick="irAPagina(${obrasPage - 1})" ${prevDis ? 'disabled' : ''}
        class="${prevDis ? btnDis : btnNormal}">Anterior</button>`;

    for (let i = 1; i <= totalPags; i++) {
        botones += `<button onclick="irAPagina(${i})"
            class="${i === obrasPage ? btnActivo : btnNormal}">${i}</button>`;
    }

    const nextDis = obrasPage === totalPags;
    botones += `<button onclick="irAPagina(${obrasPage + 1})" ${nextDis ? 'disabled' : ''}
        class="${nextDis ? btnDis : btnNormal}">Siguiente</button>`;

    c.innerHTML = `
        <div class="flex items-center justify-between flex-wrap gap-3 mt-10 pt-4 border-t border-gray-100">
            <span class="text-sm text-gray-400">Mostrando ${desde}–${hasta} de ${obras.length} obra${obras.length !== 1 ? 's' : ''}</span>
            <div class="flex items-center gap-1.5">${botones}</div>
        </div>`;
}

function irAPagina(page) {
    const totalPags = Math.max(1, Math.ceil(obras.length / PER_PAGE));
    if (page < 1 || page > totalPags) return;
    obrasPage = page;
    renderObras();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('pageshow', function(e) {
    fetch('php/get_sesion.php', { cache: 'no-store' })
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(s => {
            if (s.role !== 'colaborador') { location.replace('Login.html'); return; }
            if (s.name) document.getElementById('nombre-usuario').textContent = s.name;
            if (e.persisted) return;

            // Cargar obras desde BD
            fetch('php/get_obras_colaborador.php')
                .then(r => {
                    if (!r.ok) throw new Error(r.status);
                    return r.json();
                })
                .then(data => {
                    obras = data;
                    renderObras();
                    if (data.length) {
                        const info = document.getElementById('collab-info');
                        info.style.cssText = '';
                        info.innerHTML = `
                            <div>
                                <p class="text-xs text-gray-500 mb-0.5">Puesto</p>
                                <p class="font-semibold text-black">${data[0].puesto}</p>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 mb-0.5">Salario Semanal</p>
                                <p class="font-semibold text-[#FFC107]">${fmt(data[0].salarioSemanal)}</p>
                            </div>`;
                    }
                    // renderSummary();
                })
                .catch(() => {
                    document.getElementById('obras-container').innerHTML =
                        '<p class="text-center text-gray-500 py-12">No se pudieron cargar los datos. Intenta más tarde.</p>';
                });
        })
        .catch(() => location.replace('Login.html'));
});
</script>

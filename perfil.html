<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - PAVYPre</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" sizes="16x16" href="img/logo-16x16.png">
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="bg-black text-white shadow-lg">
        <div class="max-w-3xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                
                <div>
                    <h1 class="text-2xl font-bold"><span class="text-[#FFC107]">PAVY</span>Pre</h1>
                    <p class="text-sm text-gray-400" id="header-portal">Mi Perfil</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <a id="btn-volver" href="#" class="text-sm text-gray-300 hover:text-[#FFC107] transition-colors font-medium">
                    ← Volver
                </a>
                <a href="php/salir.php" class="bg-[#FFC107] text-black px-5 py-2 rounded hover:bg-yellow-500 transition-colors font-semibold text-sm">
                    Cerrar Sesión
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-10 space-y-6">

        <!-- Información del usuario -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h2 class="text-xl font-bold text-black mb-5">Información de cuenta</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Nombre</label>
                    <p id="perfil-nombre" class="text-base font-medium text-black bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5">—</p>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Correo electrónico</label>
                    <p id="perfil-email" class="text-base font-medium text-black bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5">—</p>
                </div>
            </div>
        </section>

        <!-- Cambio de contraseña -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h2 class="text-xl font-bold text-black mb-5">Cambiar contraseña</h2>

            <div id="pwd-success" class="hidden mb-4 bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm font-medium">
                Contraseña actualizada correctamente.
            </div>
            <div id="pwd-error" class="hidden mb-4 bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-3 text-sm"></div>

            <form id="pwd-form" class="space-y-4" novalidate>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Contraseña actual *</label>
                    <input id="pwd-actual" name="contrasena_actual" type="password"
                        class="w-full border-2 border-gray-200 rounded-lg px-4 py-2.5 focus:outline-none focus:border-[#FFC107] text-sm">
                    <p id="pwd-actual-err" class="hidden text-red-500 text-xs mt-1">Ingresa tu contraseña actual.</p>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nueva contraseña * <span class="text-gray-400 font-normal">(mínimo 8 caracteres)</span></label>
                    <input id="pwd-nueva" name="nueva_contrasena" type="password"
                        class="w-full border-2 border-gray-200 rounded-lg px-4 py-2.5 focus:outline-none focus:border-[#FFC107] text-sm">
                    <p id="pwd-nueva-err" class="hidden text-red-500 text-xs mt-1">La nueva contraseña debe tener al menos 8 caracteres.</p>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Confirmar nueva contraseña *</label>
                    <input id="pwd-confirmar" name="confirmar_contrasena" type="password"
                        class="w-full border-2 border-gray-200 rounded-lg px-4 py-2.5 focus:outline-none focus:border-[#FFC107] text-sm">
                    <p id="pwd-confirmar-err" class="hidden text-red-500 text-xs mt-1">Las contraseñas no coinciden.</p>
                </div>
                <div class="pt-1">
                    <button type="submit"
                        class="w-full sm:w-auto bg-[#FFC107] text-black px-8 py-2.5 rounded-lg hover:bg-yellow-500 font-bold text-sm transition-colors">
                        Actualizar contraseña
                    </button>
                </div>
            </form>
        </section>

    </main>

<script>
// ── Cargar sesión ─────────────────────────────────────────────
fetch('php/get_sesion.php')
    .then(r => r.json())
    .then(s => {
        if (s.error) { window.location.href = 'Login.html'; return; }

        document.getElementById('perfil-nombre').textContent = s.name  || '—';
        document.getElementById('perfil-email').textContent  = s.email || '—';

        const portalMap = { admin: 'Panel de Administración', cliente: 'Portal del Cliente', colaborador: 'Portal del Colaborador' };
        document.getElementById('header-portal').textContent = portalMap[s.role] || 'Mi Perfil';

        const backMap = { admin: 'Admin.html', cliente: 'Cliente.html', colaborador: 'Colaborador.html' };
        document.getElementById('btn-volver').href = backMap[s.role] || 'Login.html';
    })
    .catch(() => { window.location.href = 'Login.html'; });

// ── Helpers de validación ─────────────────────────────────────
function marcarErr(inputId, errId) {
    const el = document.getElementById(inputId);
    const err = document.getElementById(errId);
    el.classList.add('border-red-400');
    el.classList.remove('border-gray-200');
    err.classList.remove('hidden');
}
function limpiarErr(inputId, errId) {
    const el = document.getElementById(inputId);
    const err = document.getElementById(errId);
    el.classList.remove('border-red-400');
    el.classList.add('border-gray-200');
    err.classList.add('hidden');
}

// ── Formulario de cambio de contraseña ───────────────────────
document.getElementById('pwd-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const actual    = document.getElementById('pwd-actual').value;
    const nueva     = document.getElementById('pwd-nueva').value;
    const confirmar = document.getElementById('pwd-confirmar').value;
    let valido = true;

    document.getElementById('pwd-success').classList.add('hidden');
    document.getElementById('pwd-error').classList.add('hidden');

    if (!actual) { marcarErr('pwd-actual', 'pwd-actual-err'); valido = false; }
    else          { limpiarErr('pwd-actual', 'pwd-actual-err'); }

    if (!nueva || nueva.length < 8) { marcarErr('pwd-nueva', 'pwd-nueva-err'); valido = false; }
    else                             { limpiarErr('pwd-nueva', 'pwd-nueva-err'); }

    if (!confirmar || confirmar !== nueva) { marcarErr('pwd-confirmar', 'pwd-confirmar-err'); valido = false; }
    else                                   { limpiarErr('pwd-confirmar', 'pwd-confirmar-err'); }

    if (!valido) return;

    const fd = new FormData(this);
    fetch('php/cambiar_contrasena.php', { method: 'POST', body: fd })
        .then(r => r.json())
        .then(res => {
            if (res.error) {
                document.getElementById('pwd-error').textContent = res.error;
                document.getElementById('pwd-error').classList.remove('hidden');
                return;
            }
            document.getElementById('pwd-form').reset();
            document.getElementById('pwd-success').classList.remove('hidden');
        })
        .catch(() => {
            document.getElementById('pwd-error').textContent = 'Error de conexión. Intenta de nuevo.';
            document.getElementById('pwd-error').classList.remove('hidden');
        });
});
</script>
</body>
</html>
